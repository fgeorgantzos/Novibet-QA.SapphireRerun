name: Sapphire - rerun failed scenarios

# Lives in a SEPARATE repo (not QA.Novi). Scheduled after the Account nightly,
# because workflow_run cannot trigger across repositories.
on:
  schedule:
    - cron: "0 4 * * *"         # TODO: set to shortly after the nightly finishes (UTC)
  workflow_dispatch:
    inputs:
      name_contains:
        description: "Match Account launch names in ReportPortal"
        default: "Account"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: sapphire-rerun
  cancel-in-progress: false

jobs:
  rerun:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      RP_TOKEN: ${{ secrets.RP_TOKEN }}
      # PAT with write access to Novibet/QA.Novi (repository_dispatch + read Actions).
      GH_TOKEN: ${{ secrets.QANOVI_DISPATCH_TOKEN }}
      NAME_CONTAINS: ${{ github.event.inputs.name_contains || 'Account' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests

      - name: Extract Sapphire failures (grouped by channel)
        id: extract
        run: |
          python rp_rerun.py extract \
            --name-contains "$NAME_CONTAINS" --team Sapphire \
            --out-json failed.json --out-groups groups.json
          echo "count=$(python -c 'import json;print(len(json.load(open("groups.json"))))')" >> "$GITHUB_OUTPUT"

      - name: Nothing to rerun
        if: steps.extract.outputs.count == '0'
        run: echo "No taggable Sapphire failures. Done."

      - name: Dispatch one execute-scenarios run per channel group
        id: dispatch
        if: steps.extract.outputs.count != '0'
        run: |
          BEFORE=$(gh run list -R Novibet/QA.Novi --workflow execute-scenarios.yml \
                     --limit 1 --json databaseId --jq '.[0].databaseId // 0')
          echo "Highwater run id before dispatch: $BEFORE"

          jq -c '.[]' groups.json | while read -r g; do
            CH=$(echo "$g"  | jq -r '.channel')
            DOMS=$(echo "$g" | jq -r '.domains | join(",")')
            EXT=$(echo "$g" | jq -r '.extent')
            echo "Dispatching channel=$CH domains=$DOMS"
            curl -sf -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/Novibet/QA.Novi/dispatches" \
              -d "$(jq -n --arg ch "$CH" --arg dom "$DOMS" --arg ext "$EXT" \
                '{event_type:"run-execute-scenarios",
                  client_payload:{department:"Account", channels:$ch, domains:$dom,
                    types:"API,GUI", scopeTag:"regression", environment:"staging",
                    parallel_num:"1", extentFilter:$ext, trigger:"Rerun"}}')"
            sleep 5
          done

          echo "Waiting for dispatched runs to register..."
          sleep 30
          RUNS=$(gh run list -R Novibet/QA.Novi --workflow execute-scenarios.yml \
                   --limit 50 --json databaseId \
                   --jq "[.[] | select(.databaseId > $BEFORE) | .databaseId] | join(\",\")")
          echo "Rerun run ids: $RUNS"
          echo "run_numbers=$RUNS" >> "$GITHUB_OUTPUT"

      - name: Wait for all rerun runs to finish
        if: steps.extract.outputs.count != '0'
        run: |
          for id in $(echo "${{ steps.dispatch.outputs.run_numbers }}" | tr ',' ' '); do
            echo "Watching QA.Novi run $id"
            gh run watch "$id" -R Novibet/QA.Novi --exit-status || true
          done

      - name: Build report from ReportPortal
        if: steps.extract.outputs.count != '0'
        run: |
          python rp_rerun.py report \
            --original-json failed.json \
            --run-numbers "${{ steps.dispatch.outputs.run_numbers }}" --team Sapphire \
            --html-out site/index.html --slack-out slack.json \
            --pages-url "https://fgeorgantzos.github.io/novibet-qa.sapphirerun/"

      - name: Upload Pages artifact
        if: steps.extract.outputs.count != '0'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        if: steps.extract.outputs.count != '0'
        uses: actions/deploy-pages@v4

      - name: Notify Slack
        if: steps.extract.outputs.count != '0'
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data @slack.json "${{ secrets.SLACK_WEBHOOK_URL }}"
